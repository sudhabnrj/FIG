name: Production Build Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Verify types
      run: npx tsc --noEmit

    - name: Build Next.js app
      run: npm run build
      env:
        MONGODB_URI: 'mongodb://localhost:27017/placeholder'
        JWT_SECRET: 'placeholder_jwt_secret_value'
        NODE_ENV: production
